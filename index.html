const SUDOGWON=['서울특별시','경기도','인천광역시'];const ALARM_TEMPLATE='';/* 검토 통과 후 여기에 발송코드(예: babymoney-subsidy-time) 입력 */function askAlarm(){var card=document.getElementById('noticard');if(!ALARM_TEMPLATE||!window.__ait_requestConsent){if(card){var sub=card.querySelector('.nc-sub');if(sub)sub.textContent='알림 기능을 준비 중이에요. 곧 만나요.';}return;}window.__ait_log&&window.__ait_log('alarm_request',{});window.__ait_requestConsent(ALARM_TEMPLATE,function(type){if(type==='newAgreement'||type==='alreadyAgreed'){window.__ait_log&&window.__ait_log('alarm_agreed',{type:type});if(card){card.classList.add('done');var t=card.querySelector('.nc-title'),s=card.querySelector('.nc-sub'),b=card.querySelector('.nc-btn');if(t)t.textContent='알림 신청 완료';if(s)s.textContent='신청 시기가 되면 알려드릴게요.';if(b)b.textContent='신청됨';}}else if(type==='agreementRejected'){window.__ait_log&&window.__ait_log('alarm_rejected',{});}});}

{const d=new Date(),p=n=>String(n).padStart(2,'0');S.birth=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
const SIDOS=Object.keys(DATA).sort((a,b)=>{if(a==='(미상)')return 1;if(b==='(미상)')return -1;return Object.values(DATA[b]).flat().length-Object.values(DATA[a]).flat().length;});

function ckGet(k){try{return localStorage.getItem('bm_ck_'+k)==='1';}catch(e){return !!(window.__bm_ck&&window.__bm_ck[k]);}}
function ckSet(k,v){try{localStorage.setItem('bm_ck_'+k,v?'1':'0');}catch(e){window.__bm_ck=window.__bm_ck||{};window.__bm_ck[k]=v;}}
function ckToggle(k){ckSet(k,!ckGet(k));renderCheck();}
function ckDday(targetMs,label,pastMsg){var t=new Date();t.setHours(0,0,0,0);var d=Math.ceil((targetMs-t.getTime())/86400000);if(d>0)return{cls:(d<=14?'urgent':'ok'),txt:label+' D-'+d.toLocaleString()};return{cls:'past',txt:pastMsg};}
function renderCheck(){
  var bd=S.birth?new Date(S.birth):null;var items=[];
  if(bd){var t=bd.getTime();
    var d60=ckDday(t+60*86400000,'출생 60일 내 신청','소급 기한 지남 · 안 했다면 지금이라도(신청월부터)');
    var d30=ckDday(t+30*86400000,'출생신고 기한','신고 기한 지남 · 미신고면 즉시');
    var d365=ckDday(t+365*86400000,'바우처 사용기한','사용기한 임박/경과 · 확인 필요');
    items=[
      {k:'birth',ti:'출생신고',ds:'동주민센터 또는 정부24 · 출생 1개월 내',dd:d30,url:'https://www.gov.kr'},
      {k:'parent',ti:'부모급여 신청',ds:'복지로/정부24 · 만0세 월100만 · 만1세 월50만',dd:d60,url:'https://www.bokjiro.go.kr'},
      {k:'child',ti:'아동수당 신청',ds:'복지로/정부24 · 월 10만~ (부모급여와 별도)',dd:d60,url:'https://www.bokjiro.go.kr'},
      {k:'first',ti:'첫만남이용권',ds:'국민행복카드 바우처 200만(둘째이상 300만)',dd:d365,url:'https://www.bokjiro.go.kr'},
      {k:'loan',ti:'신생아 특례대출 자격 확인',ds:'아래 ‘신생아 대출’ 탭에서 한도·금리 확인',dd:null,tab:'loan'},
      {k:'local',ti:'우리 동네 출산지원금',ds:'구청·정부24에서 동네 추가 지원 확인',dd:null,url:'https://www.gov.kr'}
    ];}
  var html='<div class="cktop"><div class="ckh">📋 우리 아이 지원금 신청 체크리스트</div><div class="cks">'+(bd?'체크하면 저장돼요 · 다음에 와도 그대로':'위에서 아이 생년월일을 넣으면 기한이 계산돼요')+'</div></div>';
  if(bd){var done=items.filter(function(i){return ckGet(i.k);}).length;
    html+='<div class="ckprog"><div class="ckpb"><div class="ckpf" style="width:'+Math.round(done/items.length*100)+'%"></div></div><span>'+done+'/'+items.length+'</span></div>';
    html+=items.map(function(i){var on=ckGet(i.k);
      var dd=i.dd?('<span class="ckdd '+i.dd.cls+'">'+i.dd.txt+'</span>'):'';
      var link=i.tab?('<a href="javascript:void(0)" onclick="setTab(\''+i.tab+'\')">바로가기 ›</a>'):(i.url?('<a href="'+i.url+'" target="_blank" rel="noopener">바로가기 ›</a>'):'');
      return '<div class="ckitem'+(on?' done':'')+'"><button class="ckchk" onclick="ckToggle(\''+i.k+'\')" aria-label="신청 완료 체크">'+(on?'✓':'')+'</button><div class="ckbody"><div class="ckt">'+i.ti+'</div><div class="ckds">'+i.ds+'</div><div class="ckmeta">'+dd+link+'</div></div></div>';}).join('');
    html+='<div class="disc">※ 기한은 일반 기준 자동 계산이에요. 소급·자격 조건은 복지로·정부24·구청에서 최종 확인하세요. 협찬 없음, 내돈내산.</div>';}
  $('#view').innerHTML=html;
}
async function shareResult(){
  var man=window.__bm_tot||0;
  var amt=(man>=10000)?((man/10000).toFixed(man%10000?1:0)+'억원'):(man.toLocaleString('ko-KR')+'만원');
  var msg='우리 아이가 평생 받을 정부 지원금 '+amt+'! 👶💰\n아기머니에서 우리 동네 기준으로 1초 만에 확인해봐';
  try{
    if(window.__ait_getTossShareLink&&window.__ait_share){
      var link=await window.__ait_getTossShareLink('intoss://babymoney','https://static.toss.im/icons/png/4x/icon-share-dots-mono.png');
      await window.__ait_share({message:msg+'\n'+link});
      return;
    }
  }catch(e){console.error('[share]',e);}
  try{ if(navigator.share){ await navigator.share({text:msg}); return; } }catch(e){}
  try{ await navigator.clipboard.writeText(msg); alert('공유 문구를 복사했어요! 붙여넣기 해서 보내보세요.'); }catch(e){ alert(msg); }
}
function render(){document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===S.tab));if(S.tab==='main')renderMain();else if(S.tab==='loan')renderLoan();else if(S.tab==='check')renderCheck();else renderMiss();}
function setTab(t){S.tab=t;$('#scroll').scrollTop=0;render();}
{try{const qt=new URLSearchParams(location.search).get('tab');if(qt&&['main','miss','loan'].includes(qt))S.tab=qt;}catch(e){}}
renderProfile();render();
</script></body></html>
